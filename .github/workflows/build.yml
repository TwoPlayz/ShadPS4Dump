name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache Qt
        id: qt-cache
        uses: actions/cache@v4
        with:
          path: .qt
          key: qt-6.10.0-msvc2022-${{ runner.os }}

      - name: Install Qt
        if: steps.qt-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          pip install aqtinstall
          python -m aqt install-qt windows desktop 6.10.0 win64_msvc2022_64 -m qtbase -O .qt

      - name: Configure
        shell: pwsh
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 `
            "-DCMAKE_PREFIX_PATH=$PWD/.qt/6.10.0/msvc2022_64"

      - name: Build
        shell: pwsh
        run: cmake --build build --config Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: version-dll
          path: build/dist/Release/version.dll
          if-no-files-found: error
